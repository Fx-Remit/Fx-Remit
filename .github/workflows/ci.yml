name: CI

on:
  push:
    branches: ["main", "feat/*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Turborepo High-Fidelity Cache
        uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Lint
        run: pnpm turbo lint --concurrency=1 --continue

      - name: Build
        run: pnpm turbo build --concurrency=1 --continue
